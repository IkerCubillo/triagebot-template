<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl p-6">
    <h1 class="text-3xl font-bold">TriageBot</h1>
    <p class="mt-2 text-slate-600">Tablero de incidencias con clasificación automática por IA.</p>

    <section class="mt-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-lg font-semibold">Crear ticket</h2>
      <form
        hx-post="/tickets/form"
        hx-target="#tickets-table"
        hx-swap="innerHTML"
        hx-indicator="#table-loading"
        hx-on::after-request="this.reset()"
        class="mt-3 space-y-3"
      >
        <div>
          <label for="title" class="block text-sm font-medium text-slate-700">Título</label>
          <input
            id="title" name="title" type="text" required maxlength="200"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
          >
        </div>
        <div>
          <label for="description" class="block text-sm font-medium text-slate-700">Descripción</label>
          <textarea
            id="description" name="description" required maxlength="5000" rows="3"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
          ></textarea>
        </div>
        <div class="text-right">
          <button type="submit" class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">
            Crear ticket
          </button>
        </div>
      </form>
    </section>

    <section class="mt-6">
      <form id="ticket-filters" class="flex flex-wrap items-end gap-3">
        <div>
          <label for="filter-category" class="block text-sm font-medium text-slate-700">Categoría</label>
          <select
            id="filter-category" name="category"
            class="mt-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm"
            hx-get="/tickets/table" hx-trigger="change" hx-include="#ticket-filters"
            hx-target="#tickets-table" hx-swap="innerHTML" hx-indicator="#table-loading"
          >
            <option value="">Todas las categorías</option>
            <option value="bug">Error</option>
            <option value="feature_request">Nueva funcionalidad</option>
            <option value="question">Consulta</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>
        <div>
          <label for="filter-priority" class="block text-sm font-medium text-slate-700">Prioridad</label>
          <select
            id="filter-priority" name="priority"
            class="mt-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm"
            hx-get="/tickets/table" hx-trigger="change" hx-include="#ticket-filters"
            hx-target="#tickets-table" hx-swap="innerHTML" hx-indicator="#table-loading"
          >
            <option value="">Todas las prioridades</option>
            <option value="P1">P1 · Alta</option>
            <option value="P2">P2 · Media</option>
            <option value="P3">P3 · Normal</option>
          </select>
        </div>
        <div>
          <label for="filter-status" class="block text-sm font-medium text-slate-700">Estado</label>
          <select
            id="filter-status" name="status"
            class="mt-1 rounded-md border border-slate-300 px-3 py-1.5 text-sm"
            hx-get="/tickets/table" hx-trigger="change" hx-include="#ticket-filters"
            hx-target="#tickets-table" hx-swap="innerHTML" hx-indicator="#table-loading"
          >
            <option value="">Todos los estados</option>
            <option value="open">Abierto</option>
            <option value="in_progress">En progreso</option>
            <option value="closed">Cerrado</option>
          </select>
        </div>
        <button
          type="reset"
          hx-get="/tickets/table" hx-target="#tickets-table" hx-swap="innerHTML" hx-indicator="#table-loading"
          class="rounded-md border border-slate-300 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-100"
        >
          Limpiar filtros
        </button>
        <span id="table-loading" class="htmx-indicator text-sm text-slate-500">Actualizando tablero...</span>
      </form>
    </section>

    <section class="mt-4">
      <div id="tickets-table">
        {% include "_tickets_table.html" %}
      </div>
    </section>
  </main>
</body>
</html>
